version: "3.9"

services:
  stt-server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        - MODEL_SIZE=${MODEL_SIZE:-medium}
        - HF_ENDPOINT=${HF_ENDPOINT:-https://hf-mirror.com}
    image: realtime-stt:latest
    container_name: stt-server
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./models:/models
      - ./server:/app:ro
      - ./demo:/demo:ro
    environment:
      - DEMO_PATH=/demo/index.html
      # ── 模型 ──
      # 可选: tiny, tiny.en, base, base.en, small, small.en, medium, medium.en,
      #       large-v1, large-v2, large-v3, large-v3-turbo, distil-large-v2, distil-large-v3
      - MODEL_SIZE=${MODEL_SIZE:-medium}
      - DEVICE=${DEVICE:-cpu}
      - COMPUTE_TYPE=${COMPUTE_TYPE:-int8}
      - LANGUAGE=${LANGUAGE:-}
      # ── VAD ──
      - VAD_BACKEND=${VAD_BACKEND:-webrtcvad}
      - VAD_AGGRESSIVENESS=${VAD_AGGRESSIVENESS:-2}
      - VAD_SILENCE_THRESHOLD_MS=${VAD_SILENCE_THRESHOLD_MS:-600}
      - VAD_MIN_SPEECH_MS=${VAD_MIN_SPEECH_MS:-250}
      # ── 服务器限制 ──
      - MAX_CLIENTS=${MAX_CLIENTS:-10}
      - SESSION_TIMEOUT_SEC=${SESSION_TIMEOUT_SEC:-60}
      - SILENCE_TIMEOUT_SEC=${SILENCE_TIMEOUT_SEC:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_ENDPOINT=https://hf-mirror.com
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

